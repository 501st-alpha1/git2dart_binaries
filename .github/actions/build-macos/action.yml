name: Build libgit2 macOS
description: Build libgit2 and libssh2 on macOS with OpenSSL
inputs:
  libgit2_version:
    description: Version of libgit2 to build
    required: true
  libssh2_version:
    description: Version of libssh2 to build
    required: true
runs:
  using: composite
  steps:
    # - name: Install dependencies
    #   shell: bash
    #   run: brew install openssl cmake

    - name: Checkout libssh2
      uses: actions/checkout@v6
      with:
        repository: libssh2/libssh2
        ref: refs/tags/libssh2-${{ inputs.libssh2_version }}
        path: ./libssh2

    - name: Build libssh2
      shell: bash
      run: |
        set -euo pipefail
        cd libssh2
        mkdir -p build && cd build
        cmake -DCRYPTO_BACKEND=OpenSSL \
              -DCMAKE_INSTALL_PREFIX=/tmp/libssh2/install \
              -DCMAKE_INSTALL_NAME_DIR="@rpath" \
              -DCMAKE_INSTALL_RPATH="@loader_path" \
              ..
        cmake --build . --target install

    - name: Checkout libgit2
      uses: actions/checkout@v6
      with:
        repository: libgit2/libgit2
        ref: refs/tags/v${{ inputs.libgit2_version }}
        path: ./libgit2

    - name: Uninstall brew libssh2
      shell: bash
      run: brew uninstall --ignore-dependencies libssh2

    - name: Build libgit2
      shell: bash
      run: |
        cd libgit2
        mkdir -p build && cd build
        cmake -DUSE_SSH=libssh2 \
              -DBUILD_TESTS=ON \
              -DEXPERIMENTAL_SHA256=ON \
              -DLIBSSH2_INCLUDE_DIR=/tmp/libssh2/install/include \
              -DLIBSSH2_LIBRARY=/tmp/libssh2/install/lib/libssh2.dylib \
              -DCMAKE_INSTALL_PREFIX=/tmp/libgit2/install \
              ..
        cmake --build . --target install
        ./libgit2_tests

    - name: Export git2 library
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p export
        # Export under a stable file name and make the dylib's own install_name
        # match it. The libgit2 version itself is controlled by LIBGIT2_VERSION
        # in the workflow, not by platform file names.
        cp /tmp/libgit2/install/lib/libgit2-experimental.dylib export/libgit2.dylib
        install_name_tool -id @rpath/libgit2.dylib export/libgit2.dylib

        cp /tmp/libssh2/install/lib/libssh2.dylib export/libssh2.1.dylib
        install_name_tool -id @rpath/libssh2.1.dylib export/libssh2.1.dylib

        libssh2_path="$(
          otool -L export/libgit2.dylib |
            awk '/libssh2.*\.dylib/ { print $1; exit }'
        )"
        if [ -n "$libssh2_path" ] && [ "$libssh2_path" != "@rpath/libssh2.1.dylib" ]; then
          install_name_tool \
            -change "$libssh2_path" @rpath/libssh2.1.dylib \
            export/libgit2.dylib
        fi

        libcrypto_path="$(
          otool -L export/libgit2.dylib export/libssh2.1.dylib |
            awk '/libcrypto\.3\.dylib/ && $1 ~ /^\// { print $1; exit }'
        )"

        if [ -z "$libcrypto_path" ]; then
          echo "::error::Could not find the source path for libcrypto.3.dylib"
          otool -L export/libgit2.dylib
          otool -L export/libssh2.1.dylib
          exit 1
        fi

        cp "$libcrypto_path" export/libcrypto.3.dylib
        install_name_tool -id @rpath/libcrypto.3.dylib export/libcrypto.3.dylib

        for dylib in export/libgit2.dylib export/libssh2.1.dylib; do
          if otool -L "$dylib" | awk '{ print $1 }' | grep -Fqx "$libcrypto_path"; then
            install_name_tool \
              -change "$libcrypto_path" @rpath/libcrypto.3.dylib \
              "$dylib"
          fi
        done

        if otool -L export/*.dylib | grep -E '/(opt/homebrew|usr/local)/'; then
          echo "::error::Exported macOS dylibs must not reference Homebrew paths"
          exit 1
        fi

        otool -L export/libgit2.dylib
        otool -L export/libssh2.1.dylib
        otool -L export/libcrypto.3.dylib

    - name: Cache git2 library
      uses: actions/upload-artifact@v7
      with:
        name: cache-macos
        path: export/**
