name: Build libgit2 macOS
description: Build libgit2 with static libssh2 and OpenSSL on macOS
inputs:
  libgit2_version:
    description: Version of libgit2 to build
    required: true
  libssh2_version:
    description: Version of libssh2 to build
    required: true
  openssl_version:
    description: Version of OpenSSL to build
    required: true
runs:
  using: composite
  steps:
    - name: Checkout OpenSSL
      uses: actions/checkout@v6
      with:
        repository: openssl/openssl
        ref: refs/tags/openssl-${{ inputs.openssl_version }}
        path: ./openssl

    - name: Checkout libssh2
      uses: actions/checkout@v6
      with:
        repository: libssh2/libssh2
        ref: refs/tags/libssh2-${{ inputs.libssh2_version }}
        path: ./libssh2

    - name: Checkout libgit2
      uses: actions/checkout@v6
      with:
        repository: libgit2/libgit2
        ref: refs/tags/v${{ inputs.libgit2_version }}
        path: ./libgit2

    - name: Build libgit2
      shell: bash
      run: |
        set -euo pipefail

        build_root="/tmp/git2dart-macos"
        openssl_install="$build_root/openssl"
        libssh2_install="$build_root/libssh2"
        libgit2_install="$build_root/libgit2"

        rm -rf "$build_root"
        mkdir -p "$build_root"

        case "$(uname -m)" in
          arm64) openssl_target="darwin64-arm64-cc" ;;
          x86_64) openssl_target="darwin64-x86_64-cc" ;;
          *)
            echo "::error::Unsupported macOS architecture: $(uname -m)"
            exit 1
            ;;
        esac

        cp -R ./openssl "$build_root/openssl-src"
        pushd "$build_root/openssl-src"
        ./Configure "$openssl_target" \
          no-shared \
          no-tests \
          --prefix="$openssl_install"
        make clean || true
        make -j"$(sysctl -n hw.ncpu)" build_libs
        make install_dev
        popd

        cmake -S ./libssh2 -B "$build_root/libssh2-bld" \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TESTING=OFF \
          -DBUILD_TESTS=OFF \
          -DCRYPTO_BACKEND=OpenSSL \
          -DOPENSSL_ROOT_DIR="$openssl_install" \
          -DOPENSSL_INCLUDE_DIR="$openssl_install/include" \
          -DOPENSSL_SSL_LIBRARY="$openssl_install/lib/libssl.a" \
          -DOPENSSL_CRYPTO_LIBRARY="$openssl_install/lib/libcrypto.a" \
          -DCMAKE_INSTALL_PREFIX="$libssh2_install"
        cmake --build "$build_root/libssh2-bld" --target install -- -j"$(sysctl -n hw.ncpu)"

        PKG_CONFIG_PATH="$libssh2_install/lib/pkgconfig" \
        cmake -S ./libgit2 -B "$build_root/libgit2-bld" \
          -DBUILD_TESTS=ON \
          -DUSE_SSH=libssh2 \
          -DUSE_HTTPS=OpenSSL \
          -DEXPERIMENTAL_SHA256=ON \
          -DLIBSSH2_INCLUDE_DIR="$libssh2_install/include" \
          -DLIBSSH2_LIBRARY="$libssh2_install/lib/libssh2.a" \
          -DOPENSSL_ROOT_DIR="$openssl_install" \
          -DOPENSSL_INCLUDE_DIR="$openssl_install/include" \
          -DOPENSSL_SSL_LIBRARY="$openssl_install/lib/libssl.a" \
          -DOPENSSL_CRYPTO_LIBRARY="$openssl_install/lib/libcrypto.a" \
          -DCMAKE_LIBRARY_PATH="$libssh2_install/lib;$openssl_install/lib" \
          -DCMAKE_FIND_ROOT_PATH="$libssh2_install;$openssl_install" \
          -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
          -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
          -DCMAKE_INSTALL_PREFIX="$libgit2_install"
        cmake --build "$build_root/libgit2-bld" --target install -- -j"$(sysctl -n hw.ncpu)"
        "$build_root/libgit2-bld/libgit2_tests"

    - name: Export git2 library
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p export
        cp /tmp/git2dart-macos/libgit2/lib/libgit2-experimental.dylib export/libgit2.dylib
        install_name_tool -id @rpath/libgit2.dylib export/libgit2.dylib

        if otool -L export/libgit2.dylib | grep -E '/(opt/homebrew|usr/local)/|libssh2|libcrypto|libssl'; then
          echo "::error::Exported macOS dylibs must not reference Homebrew paths"
          echo "::error::libssh2 and OpenSSL must be statically linked into libgit2.dylib"
          exit 1
        fi

        otool -L export/libgit2.dylib

    - name: Cache git2 library
      uses: actions/upload-artifact@v7
      with:
        name: cache-macos
        path: export/**
