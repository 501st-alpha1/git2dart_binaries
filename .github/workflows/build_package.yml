name: Build package
on:
  push:
    # tags:
    # - "v[0-9]+.[0-9]+.[0-9]+*"
    branches:
      - "main"
      - "1.11.1"
      # - "**"
  pull_request:
    branches:
      - "main"
env:
  PUB_ENVIRONMENT: bot.github
  LIBGIT2_VERSION: "1.9.4"
  LIBSSH2_VERSION: "1.11.1"
  OPENSSL_VERSION: "3.0.15"


jobs:
  generate_bindings:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Linux artifacts
        uses: ./.github/actions/generate-bindings
        with:
          libgit2_version: ${{ env.LIBGIT2_VERSION }}

  build_libgit2_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Linux artifacts
        uses: ./.github/actions/build-linux
        with:
          libgit2_version: ${{ env.LIBGIT2_VERSION }}
          libssh2_version: ${{ env.LIBSSH2_VERSION }}

  build_libgit2_macos:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build macOS artifacts
        uses: ./.github/actions/build-macos
        with:
          libgit2_version: ${{ env.LIBGIT2_VERSION }}
          libssh2_version: ${{ env.LIBSSH2_VERSION }}

  build_libgit2_ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slice: iphoneos-arm64
            sdk: iphoneos
            arch: arm64
            openssl_target: ios64-xcrun
          - slice: iphonesimulator-arm64
            sdk: iphonesimulator
            arch: arm64
            openssl_target: iossimulator-xcrun
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build iOS slice
        uses: ./.github/actions/build-ios
        with:
          libgit2_version: ${{ env.LIBGIT2_VERSION }}
          libssh2_version: ${{ env.LIBSSH2_VERSION }}
          openssl_version: ${{ env.OPENSSL_VERSION }}
          ios_sdk: ${{ matrix.sdk }}
          architecture: ${{ matrix.arch }}
          openssl_target: ${{ matrix.openssl_target }}
          artifact_name: cache-ios-${{ matrix.slice }}

  assemble_libgit2_ios:
    needs: [build_libgit2_ios]
    runs-on: macos-latest
    steps:
      - name: Download iOS slices
        uses: actions/download-artifact@v7
        with:
          pattern: cache-ios-*
          path: /tmp/git2dart-ios/slices
          merge-multiple: true

      - name: Assemble iOS XCFrameworks
        shell: bash
        run: |
          set -euo pipefail

          slices_dir="/tmp/git2dart-ios/slices"
          output_dir="/tmp/git2dart-ios/export"
          simulator_dir="$slices_dir/iphonesimulator-arm64"

          mkdir -p "$output_dir"

          xcodebuild -create-xcframework \
            -library "$slices_dir/iphoneos-arm64/openssl/lib/libcrypto.a" \
            -library "$simulator_dir/openssl/lib/libcrypto.a" \
            -output "$output_dir/libcrypto.xcframework"

          xcodebuild -create-xcframework \
            -library "$slices_dir/iphoneos-arm64/openssl/lib/libssl.a" \
            -library "$simulator_dir/openssl/lib/libssl.a" \
            -output "$output_dir/libssl.xcframework"

          xcodebuild -create-xcframework \
            -library "$slices_dir/iphoneos-arm64/libssh2/lib/libssh2.a" \
            -library "$simulator_dir/libssh2/lib/libssh2.a" \
            -output "$output_dir/libssh2.xcframework"

          xcodebuild -create-xcframework \
            -library "$slices_dir/iphoneos-arm64/libgit2/lib/libgit2.a" \
            -library "$simulator_dir/libgit2/lib/libgit2.a" \
            -output "$output_dir/libgit2.xcframework"

      - name: Upload iOS XCFrameworks
        uses: actions/upload-artifact@v7
        with:
          name: cache-ios
          path: /tmp/git2dart-ios/export/**

  build_libgit2_windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Windows artifacts
        uses: ./.github/actions/build-windows
        with:
          libgit2_version: ${{ env.LIBGIT2_VERSION }}
          libssh2_version: ${{ env.LIBSSH2_VERSION }}

  build_libgit2_android_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Android x86_64 artifacts
        uses: ./.github/actions/build-android
        with:
          architecture: x86_64
          libgit2_version: ${{ env.LIBGIT2_VERSION }}
          libssh2_version: ${{ env.LIBSSH2_VERSION }}
          openssl_version: ${{ env.OPENSSL_VERSION }}

  build_libgit2_android_other:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [armeabi-v7a, arm64-v8a, x86]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Android artifacts
        uses: ./.github/actions/build-android
        with:
          architecture: ${{ matrix.os }}
          libgit2_version: ${{ env.LIBGIT2_VERSION }}
          libssh2_version: ${{ env.LIBSSH2_VERSION }}
          openssl_version: ${{ env.OPENSSL_VERSION }}

  run_linux_tests:
    needs: [generate_bindings, build_libgit2_linux]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: download bindings
        uses: actions/download-artifact@v7
        with:
          path: ./lib/src/
          name: cache-bindings

      - name: download linux deps
        uses: actions/download-artifact@v7
        with:
          path: ./linux
          name: cache-linux

      - name: Install linux dependencies
        run: |
            sudo DEBIAN_FRONTEND=noninteractive apt-get update -o Acquire::Retries=3 && sudo DEBIAN_FRONTEND=noninteractive apt-get install  -o Acquire::Retries=3 -y --no-install-recommends openssl

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - run: flutter pub get
      - run: flutter test -r expanded

  run_macos_tests:
    needs: [generate_bindings, build_libgit2_macos]
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: download bindings
        uses: actions/download-artifact@v7
        with:
          path: ./lib/src/
          name: cache-bindings

      - name: download macos deps
        uses: actions/download-artifact@v7
        with:
          path: ./macos
          name: cache-macos

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - run: flutter pub get
      - run: flutter test -r expanded

  run_windows_tests:
    needs: [generate_bindings, build_libgit2_windows]
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: download bindings
        uses: actions/download-artifact@v7
        with:
          path: ./lib/src/
          name: cache-bindings

      - name: Verify windows dependencies
        shell: pwsh
        run: |
          openssl version
          Get-Command openssl -ErrorAction Stop

      - name: download windows deps
        uses: actions/download-artifact@v7
        with:
          path: ./windows
          name: cache-windows

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - run: flutter pub get
      - run: flutter test -r expanded

  run_ios_tests:
    needs: [generate_bindings, assemble_libgit2_ios]
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: download bindings
        uses: actions/download-artifact@v7
        with:
          path: ./lib/src/
          name: cache-bindings

      - name: download ios binaries
        uses: actions/download-artifact@v7
        with:
          path: ./ios
          name: cache-ios

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Prepare integration test app
        shell: bash
        run: |
          set -euo pipefail

          test_app="$RUNNER_TEMP/git2dart_mobile_test"
          flutter create --platforms=ios --org com.dartgit "$test_app"

          TEST_APP="$test_app" ruby <<'RUBY'
          require 'yaml'

          pubspec_path = File.join(ENV.fetch('TEST_APP'), 'pubspec.yaml')
          pubspec = YAML.load_file(pubspec_path)
          pubspec['dependencies'] ||= {}
          pubspec['dependencies']['git2dart_binaries'] = {
            'path' => ENV.fetch('GITHUB_WORKSPACE')
          }
          pubspec['dev_dependencies'] ||= {}
          pubspec['dev_dependencies']['flutter_test'] = {'sdk' => 'flutter'}
          pubspec['dev_dependencies']['integration_test'] = {'sdk' => 'flutter'}
          File.write(pubspec_path, pubspec.to_yaml)
          RUBY

          mkdir -p "$test_app/test" "$test_app/integration_test" "$test_app/test_driver"
          cp "$GITHUB_WORKSPACE/test/opts_bindings_integration_test.dart" "$test_app/test/"
          cp "$GITHUB_WORKSPACE/integration_test/"*.dart "$test_app/integration_test/"
          cp "$GITHUB_WORKSPACE/test_driver/integration_test.dart" "$test_app/test_driver/"

          cd "$test_app"
          flutter pub get

      - name: Boot iOS simulator
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail

          timestamp() {
            printf '[%s] %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$*"
          }

          timestamp "Finding available iPhone simulator"
          device_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && $2 ~ /[0-9A-F-]{36}/ { print $2; exit }')"

          if [ -z "$device_id" ]; then
            echo "::error::No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi

          echo "IOS_DEVICE_ID=$device_id" >> "$GITHUB_ENV"
          timestamp "Booting simulator $device_id"
          xcrun simctl boot "$device_id" || true
          timestamp "Waiting for simulator bootstatus"
          xcrun simctl bootstatus "$device_id" -b
          timestamp "Simulator is booted"

      - name: List Flutter devices
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail

          test_app="$RUNNER_TEMP/git2dart_mobile_test"
          cd "$test_app"
          flutter devices

      - name: Build iOS integration test app
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail

          timestamp() {
            printf '[%s] %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$*"
          }

          test_app="$RUNNER_TEMP/git2dart_mobile_test"
          cd "$test_app"

          timestamp "Starting flutter build ios --simulator"
          flutter build ios \
            --simulator \
            --debug \
            --target=integration_test/opts_bindings_integration_test.dart
          app_bundle="$test_app/build/ios/iphonesimulator/Runner.app"
          if [ ! -d "$app_bundle" ]; then
            echo "::error::Built iOS simulator app was not found at $app_bundle"
            find "$test_app/build/ios" -maxdepth 3 -type d -name '*.app' -print || true
            exit 1
          fi
          du -sh "$app_bundle"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_bundle/Info.plist"
          timestamp "Finished flutter build ios --simulator"

      - name: Run iOS integration tests
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail

          timestamp() {
            printf '[%s] %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$*"
          }

          test_app="$RUNNER_TEMP/git2dart_mobile_test"
          device_id="$IOS_DEVICE_ID"
          cd "$test_app"

          run_with_timeout() {
            local seconds="$1"
            shift
            ruby -e '
              require "timeout"

              seconds = Integer(ARGV.shift)
              command = ARGV
              pid = nil
              begin
                Timeout.timeout(seconds) do
                  pid = Process.spawn(*command, pgroup: true)
                  Process.wait(pid)
                  exit($?.exitstatus || 1)
                end
              rescue Timeout::Error
                if pid
                  begin
                    Process.kill("TERM", -pid)
                    sleep 5
                    Process.kill("KILL", -pid)
                  rescue Errno::ESRCH
                  end
                end
                warn "::error::Timed out after #{seconds}s: #{command.join(" ")}"
                exit 124
              end
            ' "$seconds" "$@"
          }

          run_ios_tests() {
            local seconds="$1"
            timestamp "Starting flutter test on iOS simulator with ${seconds}s timeout"
            run_with_timeout "$seconds" flutter test \
              integration_test/opts_bindings_integration_test.dart \
              -d "$device_id" \
              -r expanded
          }

          set +e
          run_ios_tests 300
          status="$?"
          set -e

          if [ "$status" -ne 0 ]; then
            if [ "$status" -ne 124 ]; then
              exit "$status"
            fi

            timestamp "iOS test timed out; rebooting simulator before retry"
            xcrun simctl shutdown "$device_id" || true
            xcrun simctl boot "$device_id" || true
            xcrun simctl bootstatus "$device_id" -b
            flutter devices

            run_ios_tests 600
          fi

          timestamp "Finished flutter test on iOS simulator"

  run_android_tests:
    needs: [generate_bindings, build_libgit2_android_x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: download bindings
        uses: actions/download-artifact@v7
        with:
          path: ./lib/src/
          name: cache-bindings

      - name: download android binaries x86_64
        uses: actions/download-artifact@v7
        with:
          path: ./android/src/main/jniLibs/x86_64
          name: cache-android-x86_64

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Prepare integration test app
        shell: bash
        run: |
          set -euo pipefail

          test_app="$RUNNER_TEMP/git2dart_mobile_test"
          flutter create --platforms=android --org com.dartgit "$test_app"

          TEST_APP="$test_app" ruby <<'RUBY'
          require 'yaml'

          pubspec_path = File.join(ENV.fetch('TEST_APP'), 'pubspec.yaml')
          pubspec = YAML.load_file(pubspec_path)
          pubspec['dependencies'] ||= {}
          pubspec['dependencies']['git2dart_binaries'] = {
            'path' => ENV.fetch('GITHUB_WORKSPACE')
          }
          pubspec['dev_dependencies'] ||= {}
          pubspec['dev_dependencies']['flutter_test'] = {'sdk' => 'flutter'}
          pubspec['dev_dependencies']['integration_test'] = {'sdk' => 'flutter'}
          File.write(pubspec_path, pubspec.to_yaml)
          RUBY

          mkdir -p "$test_app/test" "$test_app/integration_test"
          cp "$GITHUB_WORKSPACE/test/opts_bindings_integration_test.dart" "$test_app/test/"
          cp "$GITHUB_WORKSPACE/integration_test/opts_bindings_integration_test.dart" "$test_app/integration_test/"

          cd "$test_app"
          flutter pub get

      - name: Run Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: |
            cd "$RUNNER_TEMP/git2dart_mobile_test" && flutter devices
            cd "$RUNNER_TEMP/git2dart_mobile_test" && flutter test integration_test/opts_bindings_integration_test.dart -d emulator-5554 -r expanded

  publish_package:
    needs: [run_linux_tests, run_macos_tests, run_windows_tests, run_ios_tests, run_android_tests, build_libgit2_android_other]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: download bindings
        uses: actions/download-artifact@v7
        with:
          path: ./lib/src/
          name: cache-bindings

      - name: download macos binaries
        uses: actions/download-artifact@v7
        with:
          path: ./macos
          name: cache-macos

      - name: download ios binaries
        uses: actions/download-artifact@v7
        with:
          path: ./ios
          name: cache-ios

      - name: download windows binaries
        uses: actions/download-artifact@v7
        with:
          path: ./windows
          name: cache-windows

      - name: download linux binaries
        uses: actions/download-artifact@v7
        with:
          path: ./linux
          name: cache-linux

      - name: download android binaries x86_64
        uses: actions/download-artifact@v7
        with:
          path: ./android/src/main/jniLibs/x86_64
          name: cache-android-x86_64

      - name: download android binaries arm64-v8a
        uses: actions/download-artifact@v7
        with:
          path: ./android/src/main/jniLibs/arm64-v8a
          name: cache-android-arm64-v8a

      - name: download android binaries x86
        uses: actions/download-artifact@v7
        with:
          path: ./android/src/main/jniLibs/x86
          name: cache-android-x86

      - name: download android binaries armeabi-v7a
        uses: actions/download-artifact@v7
        with:
          path: ./android/src/main/jniLibs/armeabi-v7a
          name: cache-android-armeabi-v7a

      - name: Check expanded package size
        shell: bash
        run: |
          set -euo pipefail

          max_bytes=$((100 * 1024 * 1024))
          package_bytes="$(
            find \
              android assets integration_test ios lib linux macos test test_driver windows \
              CHANGELOG.md LICENSE README.md analysis_options.yaml ffigen.yaml pubspec.yaml \
              -type f -printf '%s\n' |
              awk '{ total += $1 } END { print total + 0 }'
          )"

          printf 'Expanded publish payload: %s bytes\n' "$package_bytes"
          if [ "$package_bytes" -gt "$max_bytes" ]; then
            echo "::error::Expanded publish payload exceeds ${max_bytes} bytes"
            exit 1
          fi

      - name: Zip package into cache
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: .

      - name: Publish package
        if: ${{ github.event_name != 'pull_request' }}
        uses: k-paxian/dart-package-publisher@v.1.6.2
        with:
          accessToken: ${{ secrets.PUB_DEV_PUBLISH_ACCESS_TOKEN }}
          refreshToken: ${{ secrets.PUB_DEV_PUBLISH_REFRESH_TOKEN }}
          skipTests: true
