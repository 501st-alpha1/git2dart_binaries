name: Build Android libgit2 (main branch)

# Manually triggered from the Actions tab on your fork.
# Downloads the resulting .so files as a single artifact: android-libgit2-main.
on:
  workflow_dispatch:
    inputs:
      libgit2_ref:
        description: libgit2 git ref to build (branch, tag, or SHA)
        required: false
        default: "main"
      libssh2_version:
        description: libssh2 version tag to build against
        required: false
        default: "1.11.1"
      openssl_version:
        description: OpenSSL version tag to build against
        required: false
        default: "3.0.15"

jobs:
  build_android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Android ${{ matrix.architecture }}
        uses: ./.github/actions/build-android
        with:
          architecture: ${{ matrix.architecture }}
          libgit2_ref: ${{ inputs.libgit2_ref }}
          libgit2_version: "0.0.0"   # satisfies required: true; overridden by libgit2_ref
          libssh2_version: ${{ inputs.libssh2_version }}
          openssl_version: ${{ inputs.openssl_version }}

  collect_artifacts:
    needs: [build_android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all Android artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: cache-android-*
          path: /tmp/android-out
          merge-multiple: false

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-libgit2-main
          path: /tmp/android-out/**
          retention-days: 14
