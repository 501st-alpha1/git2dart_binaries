name: Build Android libgit2 (custom ref)

# Manually triggered from the Actions tab on your fork.
# Downloads the resulting .so files as artifact: android-libgit2-custom.
on:
  workflow_dispatch:
    inputs:
      libgit2_repository:
        description: "libgit2 GitHub repository (owner/repo)"
        required: false
        default: "libgit2/libgit2"
      libgit2_ref:
        description: "libgit2 git ref (branch, tag, or SHA)"
        required: false
        default: "main"
      libssh2_version:
        description: "libssh2 version tag"
        required: false
        default: "1.11.1"
      openssl_version:
        description: "OpenSSL version tag"
        required: false
        default: "3.0.15"

jobs:
  build_android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Android ${{ matrix.architecture }}
        uses: ./.github/actions/build-android
        with:
          architecture: ${{ matrix.architecture }}
          libgit2_repository: ${{ inputs.libgit2_repository }}
          libgit2_ref: ${{ inputs.libgit2_ref }}
          libgit2_version: "0.0.0"   # satisfies required: true; overridden by libgit2_ref
          libssh2_version: ${{ inputs.libssh2_version }}
          openssl_version: ${{ inputs.openssl_version }}

  collect_artifacts:
    needs: [build_android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all Android artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: cache-android-*
          path: /tmp/android-out
          merge-multiple: false

      - name: Flatten into per-ABI folders
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/android-flat
          for abi_dir in /tmp/android-out/cache-android-*/; do
            abi=$(basename "$abi_dir" | sed 's/^cache-android-//')
            mkdir -p "/tmp/android-flat/$abi"
            cp "$abi_dir"* "/tmp/android-flat/$abi/"
          done

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-libgit2-custom
          path: /tmp/android-flat/**
          retention-days: 14
